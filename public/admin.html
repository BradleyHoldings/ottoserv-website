<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OttoServ - Super Admin Access</title>
    <style>
        body {
            background: #0a0a0a;
            color: #f3f4f6;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        .spinner {
            border: 4px solid #374151;
            border-top: 4px solid #ef4444;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: white;
            margin-bottom: 0.5rem;
        }
        p {
            color: #9ca3af;
        }
        .manual-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 1rem;
        }
        .manual-btn:hover {
            background: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>🔴 Super Admin Access</h1>
        <p>Setting up Jonathan's live data access...</p>
        <button class="manual-btn" onclick="setupAdmin()">Click if not redirected</button>
    </div>

    <script>
        function setupAdmin() {
            // Set Jonathan as super admin
            const jonathanUser = {
                id: 'jonathan-bradley',
                name: 'Jonathan Bradley',
                email: 'jonathan@ottoservco.com',
                role: 'super_admin',
                isOttoServEmployee: true,
                clientAccess: ['all'],
                permissions: [
                    'view_all_clients',
                    'manage_client_services',
                    'view_aggregate_analytics',
                    'system_admin',
                    'billing_admin'
                ]
            };

            localStorage.setItem("ottoserv_current_user", JSON.stringify(jonathanUser));
            localStorage.setItem("ottoserv_token", "super_admin_token");
            
            // Redirect to admin dashboard
            window.location.href = "/dashboard/admin";
        }

        // Auto-setup after 2 seconds
        setTimeout(setupAdmin, 2000);
    </script>
</body>
</html>
